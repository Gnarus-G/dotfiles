<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- System-wide default font families.
       Apps that request the generic aliases (monospace / sans-serif /
       serif) get these. Mirrors the Ghostty font stack. -->

  <!-- monospace: Atkinson Mono first, FiraCode Nerd Font for glyph fallback -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Atkinson Hyperlegible Mono</family>
      <family>FiraCode Nerd Font</family>
    </prefer>
  </alias>

  <!-- sans-serif: reuse Atkinson Mono (proportional variant not installed) -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Atkinson Hyperlegible Mono</family>
    </prefer>
  </alias>

  <!-- serif: fall back to Atkinson Mono too, keeps everything consistent -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Atkinson Hyperlegible Mono</family>
    </prefer>
  </alias>
</fontconfig>
